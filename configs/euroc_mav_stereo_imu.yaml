%YAML:1.0

#--------------------------------------------------------------------------------------------
# EuRoC MAV Dataset — Stereo-Inertial (Stereo+IMU) Configuration for ORB-SLAM3
#
# Dataset:    EuRoC MAV (https://projects.asl.ethz.ch/datasets/doku.php?id=kmavvisualinertialdatasets)
# Camera:     Two Aptina MT9V034 global shutter cameras (stereo pair)
# IMU:        ADIS16448
# Sequences:  MH_01..MH_05, V1_01..V2_03
#
# Usage:
#   ./Examples/Stereo-Inertial/stereo_inertial_euroc \
#       Vocabulary/ORBvoc.txt \
#       /path/to/configs/euroc_mav_stereo_imu.yaml \
#       /path/to/MH_01_easy \
#       Examples/Stereo-Inertial/EuRoC_TimeStamps/MH01.txt \
#       output_name
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"

#--------------------------------------------------------------------------------------------
# Left Camera (cam0) — calibration
#--------------------------------------------------------------------------------------------

Camera.fx: 458.654
Camera.fy: 457.296
Camera.cx: 367.215
Camera.cy: 248.375

Camera.k1: -0.28340811
Camera.k2: 0.07395907
Camera.p1: 0.00019359
Camera.p2: 1.76187114e-05

#--------------------------------------------------------------------------------------------
# Right Camera (cam1) — calibration
#--------------------------------------------------------------------------------------------

Camera2.fx: 457.587
Camera2.fy: 456.134
Camera2.cx: 379.999
Camera2.cy: 255.238

Camera2.k1: -0.28368365
Camera2.k2: 0.07451284
Camera2.p1: -0.00010473
Camera2.p2: -3.55590700e-05

#--------------------------------------------------------------------------------------------
# Stereo baseline and rectification
#--------------------------------------------------------------------------------------------

# Transformation from cam1 to cam0 frame (stereo rectification)
# T_c1_c0: right camera to left camera
Stereo.T_c1_c0: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.99997,   0.00185,  -0.00768,  -0.11007,
         -0.00185,   0.99999,   0.00024,   0.00001,
          0.00768,  -0.00024,   0.99997,   0.00022,
          0.00000,   0.00000,   0.00000,   1.00000 ]

# Stereo baseline (meters)
# Computed from T_c1_c0 translation: ~0.110 m
Stereo.b: 0.110074

# Threshold close/far points.
# Points seen as close by the stereo/RGB-D sensor are considered reliable and
# inserted from just one frame. Far points require a match in two keyframes.
Stereo.ThDepth: 40.0

#--------------------------------------------------------------------------------------------
# Camera common parameters
#--------------------------------------------------------------------------------------------

Camera.width: 752
Camera.height: 480
Camera.fps: 20.0
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# Transformation from camera frame to IMU (body) frame
#--------------------------------------------------------------------------------------------

# T_BS: camera0 to body (IMU) transform
IMU.T_b_c1: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.0148655429818,  -0.999880929698,   0.00414029679422,  -0.0216401454975,
          0.999557249008,    0.0149672133247,   0.025715529948,    -0.064676986768,
         -0.0257744366974,   0.00375618835797,  0.999660727178,    0.00981073058949,
          0.0,               0.0,               0.0,               1.0             ]

#--------------------------------------------------------------------------------------------
# IMU noise parameters (EuRoC ADIS16448)
#--------------------------------------------------------------------------------------------

# Gyroscope noise density [rad/s/sqrt(Hz)]
IMU.NoiseGyro: 1.7e-4
# Accelerometer noise density [m/s^2/sqrt(Hz)]
IMU.NoiseAcc: 2.0e-3
# Gyroscope bias random walk [rad/s^2/sqrt(Hz)]
IMU.GyroWalk: 1.9e-5
# Accelerometer bias random walk [m/s^3/sqrt(Hz)]
IMU.AccWalk: 3.0e-3
# IMU frequency [Hz]
IMU.Frequency: 200

#--------------------------------------------------------------------------------------------
# ORB Extractor Parameters
#--------------------------------------------------------------------------------------------

# Number of features per image
ORBextractor.nFeatures: 1200

# Scale factor between levels in the scale pyramid
ORBextractor.scaleFactor: 1.2

# Number of levels in the scale pyramid
ORBextractor.nLevels: 8

# FAST detection thresholds
# If iniThFAST fails to find enough features, minThFAST is used
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
Viewer.imageViewScale: 1.0
