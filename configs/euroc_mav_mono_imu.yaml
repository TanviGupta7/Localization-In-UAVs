%YAML:1.0

#--------------------------------------------------------------------------------------------
# EuRoC MAV Dataset — Monocular-Inertial (Mono+IMU) Configuration for ORB-SLAM3
#
# Dataset:    EuRoC MAV (https://projects.asl.ethz.ch/datasets/doku.php?id=kmavvisualinertialdatasets)
# Camera:     Aptina MT9V034 global shutter (left camera, cam0)
# IMU:        ADIS16448
# Sequences:  MH_01..MH_05, V1_01..V2_03
#
# Usage:
#   ./Examples/Monocular-Inertial/mono_inertial_euroc \
#       Vocabulary/ORBvoc.txt \
#       /path/to/configs/euroc_mav_mono_imu.yaml \
#       /path/to/MH_01_easy \
#       Examples/Monocular-Inertial/EuRoC_TimeStamps/MH01.txt \
#       output_name
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"

# Camera calibration and distortion parameters (OpenCV)
# Reference: EuRoC dataset paper (Burri et al., IJRR 2016)
Camera.fx: 458.654
Camera.fy: 457.296
Camera.cx: 367.215
Camera.cy: 248.375

# Radial-tangential distortion coefficients
Camera.k1: -0.28340811
Camera.k2: 0.07395907
Camera.p1: 0.00019359
Camera.p2: 1.76187114e-05

# Camera resolution
Camera.width: 752
Camera.height: 480

# Camera frames per second
Camera.fps: 20.0

# Color order of the images (0: BGR, 1: RGB, 2: GRAY)
Camera.RGB: 1

# Transformation from camera frame to IMU frame
# T_BS: camera0 sensor to body (IMU) transform
# (4x4 matrix, column-major order)
IMU.T_b_c1: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.0148655429818,  -0.999880929698,   0.00414029679422,  -0.0216401454975,
          0.999557249008,    0.0149672133247,   0.025715529948,    -0.064676986768,
         -0.0257744366974,   0.00375618835797,  0.999660727178,    0.00981073058949,
          0.0,               0.0,               0.0,               1.0             ]

# IMU noise parameters (EuRoC ADIS16448)
# Noise density [rad/s/sqrt(Hz)] (gyroscope)
IMU.NoiseGyro: 1.7e-4
# Noise density [m/s^2/sqrt(Hz)] (accelerometer)
IMU.NoiseAcc: 2.0e-3
# Random walk [rad/s^2/sqrt(Hz)] (gyroscope)
IMU.GyroWalk: 1.9e-5
# Random walk [m/s^3/sqrt(Hz)] (accelerometer)
IMU.AccWalk: 3.0e-3
# IMU frequency (Hz)
IMU.Frequency: 200

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# Number of features per image
ORBextractor.nFeatures: 1000

# Scale factor between levels in the scale pyramid
ORBextractor.scaleFactor: 1.2

# Number of levels in the scale pyramid
ORBextractor.nLevels: 8

# Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
Viewer.imageViewScale: 1.0
